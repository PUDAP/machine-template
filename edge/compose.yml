services:
  edge:
    build:
      context: ..
      dockerfile: edge/Dockerfile
    image: ghcr.io/pudap/${MACHINE_ID}-edge:latest
    container_name: ${MACHINE_ID}-edge
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
